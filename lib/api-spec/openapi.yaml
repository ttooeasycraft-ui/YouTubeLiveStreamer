openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: stream
    description: YouTube Live streaming operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /stream/status:
    get:
      operationId: getStreamStatus
      tags: [stream]
      summary: Get current stream status
      responses:
        "200":
          description: Stream status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreamStatus"
  /stream/start:
    post:
      operationId: startStream
      tags: [stream]
      summary: Start streaming a video to YouTube Live in a loop
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StreamInput"
      responses:
        "200":
          description: Stream started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreamStatus"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Stream already running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /stream/stop:
    post:
      operationId: stopStream
      tags: [stream]
      summary: Stop the current live stream
      responses:
        "200":
          description: Stream stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreamStatus"
        "404":
          description: No stream running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /stream/pause:
    post:
      operationId: pauseStream
      tags: [stream]
      summary: Pause stream (switches to black frame + silence, keeps RTMP alive)
      responses:
        "200":
          description: Stream paused
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreamStatus"
        "404":
          description: No active stream
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Stream already paused
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /stream/resume:
    post:
      operationId: resumeStream
      tags: [stream]
      summary: Resume stream after pause
      responses:
        "200":
          description: Stream resumed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreamStatus"
        "404":
          description: No paused stream
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /stream/volume:
    post:
      operationId: setVolume
      tags: [stream]
      summary: Change volume of running stream (restarts FFmpeg with new volume)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VolumeInput"
      responses:
        "200":
          description: Volume updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreamStatus"
        "404":
          description: No active stream
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /stream/switch-video:
    post:
      operationId: switchVideo
      tags: [stream]
      summary: Switch to a different video without stopping the live stream
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SwitchVideoInput"
      responses:
        "200":
          description: Video switched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreamStatus"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No active stream
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /stream/playlist:
    post:
      operationId: updatePlaylist
      tags: [stream]
      summary: Set the playlist queue (ordered list of video filenames)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaylistInput"
      responses:
        "200":
          description: Playlist updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreamStatus"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /stream/videos:
    get:
      operationId: listVideos
      tags: [stream]
      summary: List uploaded videos
      responses:
        "200":
          description: List of uploaded videos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VideoFile"
  /stream/videos/{filename}:
    delete:
      operationId: deleteVideo
      tags: [stream]
      summary: Delete an uploaded video
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Video deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: string
                required:
                  - deleted
        "404":
          description: Video not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Cannot delete video currently streaming
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /stream/import/list:
    post:
      operationId: importChannelList
      tags: [stream]
      summary: List videos from a public YouTube channel or playlist URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportListInput"
      responses:
        "200":
          description: List of channel videos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportListResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: yt-dlp not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /stream/import/download:
    post:
      operationId: importDownload
      tags: [stream]
      summary: Start downloading a YouTube video into the uploads folder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportDownloadInput"
      responses:
        "200":
          description: Download started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportDownloadResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: yt-dlp not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /stream/import/progress/{jobId}:
    get:
      operationId: importProgress
      tags: [stream]
      summary: Get download progress for a specific job
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Download progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportProgressResult"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    StreamStatus:
      type: object
      properties:
        isStreaming:
          type: boolean
        isPaused:
          type: boolean
        videoFile:
          type: ["string", "null"]
        streamKey:
          type: ["string", "null"]
        format:
          type: ["string", "null"]
        volume:
          type: integer
        startedAt:
          type: ["string", "null"]
        pausedAt:
          type: ["string", "null"]
        error:
          type: ["string", "null"]
        playlist:
          type: array
          items:
            type: string
        playlistIndex:
          type: integer
        loopMode:
          type: string
          enum: [single, playlist]
      required:
        - isStreaming
        - isPaused
        - videoFile
        - streamKey
        - format
        - volume
        - startedAt
        - pausedAt
        - error
        - playlist
        - playlistIndex
        - loopMode
    StreamInput:
      type: object
      properties:
        streamKey:
          type: string
          minLength: 1
        videoFile:
          type: string
          minLength: 1
        format:
          type: string
          enum: [landscape, shorts]
          default: landscape
        volume:
          type: integer
          minimum: 0
          maximum: 100
          default: 100
        playlist:
          type: array
          items:
            type: string
          default: []
      required:
        - streamKey
        - videoFile
    VolumeInput:
      type: object
      properties:
        volume:
          type: integer
          minimum: 0
          maximum: 100
      required:
        - volume
    SwitchVideoInput:
      type: object
      properties:
        videoFile:
          type: string
          minLength: 1
      required:
        - videoFile
    PlaylistInput:
      type: object
      properties:
        playlist:
          type: array
          items:
            type: string
      required:
        - playlist
    VideoFile:
      type: object
      properties:
        filename:
          type: string
        originalName:
          type: string
        size:
          type: integer
        uploadedAt:
          type: string
      required:
        - filename
        - originalName
        - size
        - uploadedAt
    ImportListInput:
      type: object
      properties:
        url:
          type: string
          minLength: 1
      required:
        - url
    ImportListResult:
      type: object
      properties:
        videos:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              title:
                type: string
              duration:
                type: ["integer", "null"]
              thumbnail:
                type: ["string", "null"]
              url:
                type: string
            required:
              - id
              - title
              - url
      required:
        - videos
    ImportDownloadInput:
      type: object
      properties:
        url:
          type: string
          minLength: 1
        title:
          type: string
      required:
        - url
    ImportDownloadResult:
      type: object
      properties:
        jobId:
          type: string
        title:
          type: string
      required:
        - jobId
        - title
    ImportProgressResult:
      type: object
      properties:
        jobId:
          type: string
        status:
          type: string
          enum: [downloading, done, error]
        percent:
          type: number
        filename:
          type: ["string", "null"]
        error:
          type: ["string", "null"]
      required:
        - jobId
        - status
        - percent
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
