openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: stream
    description: YouTube Live streaming operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /stream/status:
    get:
      operationId: getStreamStatus
      tags: [stream]
      summary: Get current stream status
      responses:
        "200":
          description: Stream status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreamStatus"
  /stream/start:
    post:
      operationId: startStream
      tags: [stream]
      summary: Start streaming a video to YouTube Live in a loop
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StreamInput"
      responses:
        "200":
          description: Stream started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreamStatus"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Stream already running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /stream/stop:
    post:
      operationId: stopStream
      tags: [stream]
      summary: Stop the current live stream
      responses:
        "200":
          description: Stream stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreamStatus"
        "404":
          description: No stream running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /stream/videos:
    get:
      operationId: listVideos
      tags: [stream]
      summary: List uploaded videos
      responses:
        "200":
          description: List of uploaded videos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VideoFile"
  /stream/videos/{filename}:
    delete:
      operationId: deleteVideo
      tags: [stream]
      summary: Delete an uploaded video
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Video deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: string
                required:
                  - deleted
        "404":
          description: Video not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Cannot delete video currently streaming
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    StreamStatus:
      type: object
      properties:
        isStreaming:
          type: boolean
        videoFile:
          type: ["string", "null"]
        streamKey:
          type: ["string", "null"]
        startedAt:
          type: ["string", "null"]
        error:
          type: ["string", "null"]
      required:
        - isStreaming
        - videoFile
        - streamKey
        - startedAt
        - error
    StreamInput:
      type: object
      properties:
        streamKey:
          type: string
          minLength: 1
        videoFile:
          type: string
          minLength: 1
        format:
          type: string
          enum: [landscape, shorts]
          default: landscape
      required:
        - streamKey
        - videoFile
    VideoFile:
      type: object
      properties:
        filename:
          type: string
        originalName:
          type: string
        size:
          type: integer
        uploadedAt:
          type: string
      required:
        - filename
        - originalName
        - size
        - uploadedAt
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
