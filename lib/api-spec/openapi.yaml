openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: stream
  - name: sessions
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Legacy single-stream endpoints (operate on "default" session) ──────────
  /stream/status:
    get:
      operationId: getStreamStatus
      tags: [stream]
      summary: Get default session status
      responses:
        "200":
          description: Stream status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionState"
  /stream/start:
    post:
      operationId: startStream
      tags: [stream]
      summary: Start streaming (default session)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StreamInput"
      responses:
        "200":
          description: Stream started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionState"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Already running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /stream/stop:
    post:
      operationId: stopStream
      tags: [stream]
      summary: Stop streaming (default session)
      responses:
        "200":
          description: Stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionState"
        "404":
          description: Not running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /stream/pause:
    post:
      operationId: pauseStream
      tags: [stream]
      summary: Pause (default session)
      responses:
        "200":
          description: Paused
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionState"
        "404":
          description: Not running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Already paused
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /stream/resume:
    post:
      operationId: resumeStream
      tags: [stream]
      summary: Resume (default session)
      responses:
        "200":
          description: Resumed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionState"
        "404":
          description: Not paused
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /stream/volume:
    post:
      operationId: setVolume
      tags: [stream]
      summary: Set volume (default session)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VolumeInput"
      responses:
        "200":
          description: Volume updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionState"
        "404":
          description: Not running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /stream/switch-video:
    post:
      operationId: switchVideo
      tags: [stream]
      summary: Switch video mid-stream (default session)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SwitchVideoInput"
      responses:
        "200":
          description: Video switched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionState"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /stream/playlist:
    post:
      operationId: updatePlaylist
      tags: [stream]
      summary: Update playlist (default session)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaylistInput"
      responses:
        "200":
          description: Playlist updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionState"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Videos ────────────────────────────────────────────────────────────────
  /stream/videos:
    get:
      operationId: listVideos
      tags: [stream]
      summary: List uploaded videos
      responses:
        "200":
          description: Video list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VideoFile"
  /stream/videos/{filename}:
    delete:
      operationId: deleteVideo
      tags: [stream]
      summary: Delete an uploaded video
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: string
                required:
                  - deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: In use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Multi-session ─────────────────────────────────────────────────────────
  /stream/sessions:
    get:
      operationId: listSessions
      tags: [sessions]
      summary: List all live sessions
      responses:
        "200":
          description: All sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SessionState"
    post:
      operationId: createSession
      tags: [sessions]
      summary: Create a new live session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionInput"
      responses:
        "200":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionState"
  /stream/sessions/{sessionId}:
    get:
      operationId: getSession
      tags: [sessions]
      summary: Get a specific session's status
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionState"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteSession
      tags: [sessions]
      summary: Delete a session (must be stopped)
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: string
                required:
                  - deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Still streaming
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: renameSession
      tags: [sessions]
      summary: Rename a session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenameSessionInput"
      responses:
        "200":
          description: Renamed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionState"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /stream/sessions/{sessionId}/start:
    post:
      operationId: startSession
      tags: [sessions]
      summary: Start streaming in a specific session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StreamInput"
      responses:
        "200":
          description: Started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionState"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Already streaming
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /stream/sessions/{sessionId}/stop:
    post:
      operationId: stopSession
      tags: [sessions]
      summary: Stop a specific session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionState"
        "404":
          description: Not found or not running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /stream/sessions/{sessionId}/pause:
    post:
      operationId: pauseSession
      tags: [sessions]
      summary: Pause a specific session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Paused
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionState"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Already paused
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /stream/sessions/{sessionId}/resume:
    post:
      operationId: resumeSession
      tags: [sessions]
      summary: Resume a specific session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Resumed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionState"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /stream/sessions/{sessionId}/volume:
    post:
      operationId: setSessionVolume
      tags: [sessions]
      summary: Set volume for a specific session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VolumeInput"
      responses:
        "200":
          description: Volume updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionState"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /stream/sessions/{sessionId}/switch-video:
    post:
      operationId: switchSessionVideo
      tags: [sessions]
      summary: Switch video for a specific session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SwitchVideoInput"
      responses:
        "200":
          description: Video switched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionState"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Import (yt-dlp) ────────────────────────────────────────────────────────
  /stream/import/list:
    post:
      operationId: importChannelList
      tags: [stream]
      summary: List videos from a public YouTube channel/playlist (yt-dlp)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportListInput"
      responses:
        "200":
          description: Videos found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportListResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: yt-dlp not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /stream/import/download:
    post:
      operationId: importDownload
      tags: [stream]
      summary: Start downloading a YouTube video
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportDownloadInput"
      responses:
        "200":
          description: Download started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportDownloadResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: yt-dlp not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /stream/import/progress/{jobId}:
    get:
      operationId: importProgress
      tags: [stream]
      summary: Get download progress
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportProgressResult"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    SessionState:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        isStreaming:
          type: boolean
        isPaused:
          type: boolean
        videoFile:
          type: ["string", "null"]
        streamKey:
          type: ["string", "null"]
        format:
          type: ["string", "null"]
        volume:
          type: integer
        startedAt:
          type: ["string", "null"]
        pausedAt:
          type: ["string", "null"]
        error:
          type: ["string", "null"]
        playlist:
          type: array
          items:
            type: string
        playlistIndex:
          type: integer
        loopMode:
          type: string
          enum: [single, playlist]
        createdAt:
          type: string
      required:
        - id
        - name
        - isStreaming
        - isPaused
        - videoFile
        - streamKey
        - format
        - volume
        - startedAt
        - pausedAt
        - error
        - playlist
        - playlistIndex
        - loopMode
        - createdAt

    StreamInput:
      type: object
      properties:
        streamKey:
          type: string
          minLength: 1
        videoFile:
          type: string
          minLength: 1
        format:
          type: string
          enum: [landscape, shorts]
          default: landscape
        volume:
          type: integer
          minimum: 0
          maximum: 100
          default: 100
        playlist:
          type: array
          items:
            type: string
          default: []
      required:
        - streamKey
        - videoFile

    VolumeInput:
      type: object
      properties:
        volume:
          type: integer
          minimum: 0
          maximum: 100
      required: [volume]

    SwitchVideoInput:
      type: object
      properties:
        videoFile:
          type: string
          minLength: 1
      required: [videoFile]

    PlaylistInput:
      type: object
      properties:
        playlist:
          type: array
          items:
            type: string
      required: [playlist]

    CreateSessionInput:
      type: object
      properties:
        name:
          type: string
      required: [name]

    RenameSessionInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
      required: [name]

    VideoFile:
      type: object
      properties:
        filename:
          type: string
        originalName:
          type: string
        size:
          type: integer
        uploadedAt:
          type: string
      required: [filename, originalName, size, uploadedAt]

    ImportListInput:
      type: object
      properties:
        url:
          type: string
          minLength: 1
        limit:
          type: integer
          minimum: 1
          maximum: 50
          default: 20
        sort:
          type: string
          enum: [newest, oldest]
          default: newest
      required: [url]

    ImportListResult:
      type: object
      properties:
        videos:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              title:
                type: string
              duration:
                type: ["integer", "null"]
              thumbnail:
                type: ["string", "null"]
              url:
                type: string
            required: [id, title, url]
        channelName:
          type: ["string", "null"]
      required: [videos]

    ImportDownloadInput:
      type: object
      properties:
        url:
          type: string
          minLength: 1
        title:
          type: string
      required: [url]

    ImportDownloadResult:
      type: object
      properties:
        jobId:
          type: string
        title:
          type: string
      required: [jobId, title]

    ImportProgressResult:
      type: object
      properties:
        jobId:
          type: string
        status:
          type: string
          enum: [downloading, done, error]
        percent:
          type: number
        filename:
          type: ["string", "null"]
        error:
          type: ["string", "null"]
      required: [jobId, status, percent]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]
